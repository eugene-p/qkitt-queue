name: Bug report
description: Something isn't working as expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Package version
      description: "Which version of @qkitt/queue (or @qkitt/queue-config) are you using?"
      placeholder: "0.5.5"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        A short code snippet or link to a StackBlitz/CodeSandbox that reproduces the issue.
        The smaller the repro, the faster the fix.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details — OS, bundler, related packages, error output, etc.
    validations:
      required: false
