name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: typecheck · test · build · pack
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Release check
        run: npm run release:check

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test with coverage
        run: npm run test -w @qkitt/queue -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/queue/coverage/
          retention-days: 14
