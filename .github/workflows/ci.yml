name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    name: typecheck · test · build · pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Release check
        run: npm run release:check
