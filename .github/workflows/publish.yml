name: Publish

on:
  push:
    tags:
      # Flat monorepo tags (historical + core): v0.5.3
      - "v*"
      # Package-scoped tags when versions collide across packages:
      # queue-config-v0.2.0 → publish only packages/queue-config@0.2.0
      - "*-v*"

permissions:
  contents: read

jobs:
  publish:
    name: publish changed packages to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Plan publishes (skip versions already on npm)
        id: plan
        run: |
          set -euo pipefail

          REF_NAME="${GITHUB_REF#refs/tags/}"
          # Flat: v0.5.3 → version 0.5.3, all packages
          # Scoped: queue-config-v0.2.0 → version 0.2.0, dir packages/queue-config only
          if [[ "$REF_NAME" == *-v* ]]; then
            TAG="${REF_NAME##*-v}"
            PKG_DIR="${REF_NAME%-v*}"
          else
            TAG="${REF_NAME#v}"
            PKG_DIR=""
          fi

          echo "tag_version=${TAG}"
          echo "package_dir_filter=${PKG_DIR:-"(all)"}"

          PLAN_FILE="${RUNNER_TEMP}/publish-packages.txt"
          : > "$PLAN_FILE"
          tag_matched_pending=0
          tag_matched_any=0

          # Returns 0 if name@version is already on the registry.
          already_on_npm() {
            local name="$1"
            local version="$2"
            local raw
            # npm prints E404 JSON on stdout with exit 1 for unknown packages.
            if ! raw="$(npm view "${name}" versions --json 2>/dev/null)"; then
              return 1
            fi
            printf '%s' "$raw" | node -e "
              const fs = require('fs');
              const versions = JSON.parse(fs.readFileSync(0, 'utf8'));
              const list = Array.isArray(versions) ? versions : [versions];
              process.exit(list.includes(process.argv[1]) ? 0 : 1);
            " "${version}"
          }

          for pkg_json in packages/*/package.json; do
            dir_name="$(basename "$(dirname "${pkg_json}")")"

            if [ -n "$PKG_DIR" ] && [ "$dir_name" != "$PKG_DIR" ]; then
              echo "skip (tag scoped to ${PKG_DIR}): ${pkg_json}"
              continue
            fi

            private="$(node -p "require('./${pkg_json}').private === true ? '1' : '0'")"
            if [ "$private" = "1" ]; then
              echo "skip private: ${pkg_json}"
              continue
            fi

            name="$(node -p "require('./${pkg_json}').name")"
            version="$(node -p "require('./${pkg_json}').version")"

            if [ "$version" = "$TAG" ]; then
              tag_matched_any=1
            fi

            if already_on_npm "${name}" "${version}"; then
              echo "already on npm: ${name}@${version}"
              continue
            fi

            echo "${name} ${version}" >> "$PLAN_FILE"
            echo "will publish: ${name}@${version}"
            if [ "$version" = "$TAG" ]; then
              tag_matched_pending=1
            fi
          done

          echo "plan_file=${PLAN_FILE}" >> "$GITHUB_OUTPUT"

          if [ ! -s "$PLAN_FILE" ]; then
            # Idempotent re-tag / re-run: versions already on npm → green job,
            # no failure email. Only fail when the tag matches nothing at all.
            if [ "$tag_matched_any" -eq 1 ]; then
              echo "Nothing to publish: every matching package version is already on npm (including ${REF_NAME})."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Tag ${REF_NAME} matches no package.json version, and nothing needs publishing."
            echo "Bump a package version to ${TAG} before tagging, or retag."
            exit 1
          fi

          if [ "$tag_matched_pending" -ne 1 ]; then
            echo "Tag ${REF_NAME} must match the version of at least one package being published."
            echo "Bump that package's package.json version to ${TAG}, or retag."
            exit 1
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "plan<<EOF" >> "$GITHUB_OUTPUT"
          cat "$PLAN_FILE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Release check
        if: steps.plan.outputs.skip != 'true'
        run: npm run release:check

      - name: Publish planned packages
        if: steps.plan.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH }}
        run: |
          set -euo pipefail

          already_on_npm() {
            local name="$1"
            local version="$2"
            local raw
            if ! raw="$(npm view "${name}" versions --json 2>/dev/null)"; then
              return 1
            fi
            printf '%s' "$raw" | node -e "
              const fs = require('fs');
              const versions = JSON.parse(fs.readFileSync(0, 'utf8'));
              const list = Array.isArray(versions) ? versions : [versions];
              process.exit(list.includes(process.argv[1]) ? 0 : 1);
            " "${version}"
          }

          while IFS= read -r line; do
            [ -n "$line" ] || continue
            name="${line%% *}"
            version="${line#* }"
            if already_on_npm "${name}" "${version}"; then
              echo "skip (already on npm): ${name}@${version}"
              continue
            fi
            echo "Publishing ${name}@${version}…"
            npm publish -w "${name}" --access public
          done < "${{ steps.plan.outputs.plan_file }}"
